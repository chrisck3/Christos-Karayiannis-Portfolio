<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Christos Karayiannis</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        nav h2 a {
            transition: opacity 0.2s ease;
        }

        nav h2 a:hover {
            opacity: 0.7;
        }

        .project-container {
            max-width: 1400px;
            margin: 60px auto;
            padding: 50px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: #2980b9;
        }

        .project-title {
            font-size: 2.8em;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .project-desc {
            font-size: 1.1em;
            line-height: 1.8;
            color: #555;
            margin-bottom: 40px;
        }

        .youtube-btn {
            display: none;
            background-color: #c4302b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .pdf-btn {
            display: none;
            background-color: #3498db;
            /* Blue */
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 40px;
            margin-left: 10px;
        }

        /* Gallery Grid Setup */
        .image-gallery {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 25px;
            align-items: start;
        }

        .image-column {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        /* New style for a full-width image grid */
        .full-width-image-grid {
            grid-column: 1 / -1;
            /* Span all columns */
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* Two columns */
            gap: 25px;
        }

        /* Styles for report page images */
        .report-page-image {
            height: auto !important;
            /* Override fixed height for natural aspect ratio */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15) !important;
        }

        .image-gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .image-gallery img:hover {
            transform: scale(1.03);
        }

        /* Lightbox Modal Styles */
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-modal.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .lightbox-modal.show .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .lightbox-close:hover {
            color: #bdc3c7;
        }

        /* Lightbox Navigation */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3em;
            color: white;
            cursor: pointer;
            user-select: none;
            padding: 10px 20px;
            transition: background-color 0.2s ease;
        }

        .lightbox-nav:hover {
            background-color: rgba(0, 0, 0, 0.3);
        }

        .prev {
            left: 0;
            border-radius: 0 8px 8px 0;
        }

        .next {
            right: 0;
            border-radius: 8px 0 0 8px;
        }
    </style>
</head>

<body>

    <nav>
        <h2><a href="index.html" style="text-decoration: none; color: inherit;">CK.</a></h2>
        <div><a href="index.html#projects">Back to Portfolio</a></div>
    </nav>

    <div class="project-container">
        <a href="index.html#projects" class="back-btn">&#8592; Back to Portfolio</a>

        <h1 class="project-title" id="proj-title">Loading Project...</h1>
        <p class="project-desc" id="proj-desc"></p>
        <a id="youtube-link" class="youtube-btn" href="#" target="_blank" style="margin-left: 0;">View Project on
            YouTube &#9658;</a>
        <a id="pdf-link" class="pdf-btn" href="#" target="_blank">View PDF Report &#128196;</a>

        <div class="image-gallery" id="proj-gallery"></div>
    </div>

    <div id="lightbox" class="lightbox-modal">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span id="lightbox-prev" class="lightbox-nav prev" onclick="changeImage(-1)">&#10094;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Expanded View">
        <span id="lightbox-next" class="lightbox-nav next" onclick="changeImage(1)">&#10095;</span>
    </div>

    <script>
        const projectData = {
            '1': {
                title: 'Quadcopter Project',
                desc: 'Here is an in-depth look at my Quadcopter project. I designed and built this from the ground up, utilizing mechanical design principles and hands-on manufacturing to create a fully functioning drone.',
                video: 'Quadcopter-vide.mp4',
                images: [
                    'quadcopter-1.jpg',
                    'quadcopter-2.jpg',
                    'quadcopter-3.jpg',
                    'quadcopter-4.jpg'
                ]
            },
            '2': {
                title: 'Robot Walker Project',
                desc: 'Details and information about the Robot Walker Project will be displayed here.',
                images: [
                    'RobotWalker-1.jpg',
                    'RobotWalker-5.jpg',
                    'RobotWalker-3.jpg',
                    'RobotWalker-4.jpg'
                ],
                bottomImage: 'RobotWalker-2.jpg',
                youtube: 'https://www.youtube.com/@QuadrupedalRobot-GDP'
            },
            '3': {
                title: 'Machine Learning Projects',
                desc: 'Details and information about my Machine Learning Projects. You can add screenshots or graphics to the array below.',
                pdfReport: 'ML Report.pdf'
            }
        };

        let currentGalleryImages = [];
        let currentImageIndex = -1;

        // FIXED: Asking for 'imgElement' directly to get exact relative path
        function openLightbox(imgElement) {
            const imgSrc = imgElement.getAttribute('src');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');

            currentImageIndex = currentGalleryImages.indexOf(imgSrc);
            if (currentImageIndex === -1) return;

            lightboxImg.src = imgSrc;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden';
            updateLightboxNav();
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        function changeImage(direction) {
            event.stopPropagation(); // Prevent background click from closing
            currentImageIndex += direction;

            if (currentImageIndex < 0) {
                currentImageIndex = currentGalleryImages.length - 1;
            } else if (currentImageIndex >= currentGalleryImages.length) {
                currentImageIndex = 0;
            }

            document.getElementById('lightbox-img').src = currentGalleryImages[currentImageIndex];
            updateLightboxNav();
        }

        function updateLightboxNav() {
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');
            if (currentGalleryImages.length <= 1) {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
                nextBtn.style.display = 'block';
            }
        }

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('id');
        const data = projectData[projectId];

        if (data) {
            document.getElementById('proj-title').innerText = data.title;
            document.getElementById('proj-desc').innerText = data.desc;

            const youtubeBtn = document.getElementById('youtube-link');
            const pdfBtn = document.getElementById('pdf-link');

            if (data.youtube) {
                youtubeBtn.href = data.youtube;
                youtubeBtn.style.display = 'inline-block';
            } else {
                youtubeBtn.style.display = 'none';
            }

            if (data.pdfReport) {
                pdfBtn.href = data.pdfReport;
                pdfBtn.style.display = 'inline-block';
            } else {
                pdfBtn.style.display = 'none';
            }

            const gallery = document.getElementById('proj-gallery');
            let leftImagesHTML = '';
            let rightImagesHTML = '';
            let videoHTML = '';
            let bottomImageHTML = '';

            if (data.video) {
                videoHTML = `<video controls autoplay muted playsinline loop preload="auto" style="width: 100%; height: 615px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                                <source src="${data.video}" type="video/mp4"> 
                                Your browser does not support the video tag.
                             </video>`;
            }

            let galleryContentHTML = '';
            let leftImageItems = '';
            let rightImageItems = '';
            let centerColumnContent = videoHTML;

            if (data.images && data.images.length > 0) {
                // If there's no video, use a full-width grid for the images.
                if (!data.video) {
                    galleryContentHTML = '<div class="full-width-image-grid">';
                    data.images.forEach(imgSrc => {
                        // Add a special class if it's a report page
                        const isReportPage = imgSrc.includes('reports/images/');
                        const imgClass = isReportPage ? 'report-page-image' : '';
                        const altText = isReportPage ? 'Machine Learning Report Page' : `${data.title} Image`;

                        galleryContentHTML += `<img src="${imgSrc}" class="${imgClass}" alt="${altText}" onclick="openLightbox(this)">`;
                    });
                    galleryContentHTML += '</div>';
                } else {
                    // If there is a video, use the 3-column layout.
                    const midPoint = Math.ceil(data.images.length / 2);
                    data.images.forEach((imgSrc, i) => {
                        const imgTag = `<img src="${imgSrc}" alt="${data.title} Image" onclick="openLightbox(this)">`;
                        if (i < midPoint) {
                            leftImageItems += imgTag;
                        } else {
                            rightImageItems += imgTag;
                        }
                    });
                }
            }

            // Only build the 3-column layout if there is a video.
            if (data.video) {
                const leftColumnHTML = `<div class="image-column">${leftImageItems}</div>`;
                const centerColumnHTML = `<div class="image-column">${centerColumnContent || ''}</div>`;
                const rightColumnHTML = `<div class="image-column">${rightImageItems}</div>`;
                galleryContentHTML = leftColumnHTML + centerColumnHTML + rightColumnHTML;
            }

            if (data.bottomImage) {
                bottomImageHTML = `<img src="${data.bottomImage}" alt="${data.title} Expanded Image" style="grid-column: 1 / -1; width: 100%; height: auto; max-height: 700px; object-fit: cover; border-radius: 8px; margin-top: 15px;" onclick="openLightbox(this)">`;
            }

            currentGalleryImages = [];
            if (data.images) currentGalleryImages.push(...data.images);
            if (data.bottomImage) currentGalleryImages.push(data.bottomImage);

            if ((!data.images || data.images.length === 0) && !data.video && !data.bottomImage) {
                gallery.innerHTML = '';
            } else {
                gallery.innerHTML = galleryContentHTML + bottomImageHTML;

                const vidElement = gallery.querySelector('video');
                if (vidElement) {
                    vidElement.play().catch(e => console.log("Browser prevented autoplay:", e));
                }
            }
        } else {
            document.getElementById('proj-title').innerText = 'Project Not Found';
            document.getElementById('proj-desc').innerText = 'The project you are looking for does not exist or has been moved.';
        }

        // Close lightbox with background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeLightbox();
            }
        });
    </script>

</body>

</html>
